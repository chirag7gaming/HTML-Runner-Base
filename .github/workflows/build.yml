name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate Keystore
        run: |
          mkdir -p android/app
          keytool -genkey -v \
            -keystore android/app/keystore.jks \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -alias htmlrunner \
            -dname "CN=Chirag Shylendra, O=HTML Runner, C=IN" \
            -storepass htmlrunner123 \
            -keypass htmlrunner123

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Release APK
        env:
          KEY_ALIAS: htmlrunner
          KEY_PASSWORD: htmlrunner123
          KEYSTORE_PASSWORD: htmlrunner123
        run: |
          mkdir -p android/app
          cd android
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HTML-Runner
          path: android/app/build/outputs/apk/release/app-release.apk
